# ltvm dnsmasq config for macOS hosts.
#
# Bound to socket_vmnet's gateway IP so VMs can resolve each other
# by name -- their resolv.conf points at fc_gw (192.168.105.1) and
# we maintain VM names in /etc/hosts via register_ssh_name().  Unknown
# queries forward to a public resolver so VMs still get general DNS.
#
# Linux uses host-config/qemu-dnsmasq.conf; macOS doesn't need the
# DHCP block since socket_vmnet provides DHCP via vmnet-shared.

listen-address=@VMNET_GATEWAY@
bind-interfaces
port=53
no-resolv
server=8.8.8.8
server=8.8.4.4
# /etc/hosts is read by default; ltvm appends `<ip> <name> # qemu-vm:<name>`
# entries via register_ssh_name() and SIGHUPs us to pick them up.
