defaults:
  arch: x86_64
  os_family: rhel
targets:
  rocky10:
    container_image: quay.io/rockylinux/rockylinux:10.1
    default_mem: 4096
    kernels:
      available:
      - 6.12-rhel10.1
      - name: 6.12-rhel10.0
        srpm_version: 6.12.0-55.41.1.el10_0
      config:
        CONFIG_XEN_PVH: y
      default: 6.12-rhel10.0
    lustre:
      mode: server_ldiskfs
    os_name: rocky
    os_version: '10.1'
    srpm_url: https://dl.rockylinux.org/pub/rocky/10/BaseOS/source/tree/Packages/k
    status: working
  rocky8:
    container_image: rockylinux:8.9
    kernels:
      available:
      - 4.18-rhel8.10
      config:
        CONFIG_XEN_PVH: y
      default: 4.18-rhel8.10
    lustre:
      mode: server_ldiskfs
    os_name: rocky
    os_version: '8.9'
    srpm_url: https://dl.rockylinux.org/pub/rocky/8/BaseOS/source/tree/Packages/k
    status: working
  rocky9:
    container_image: rockylinux:9
    kernels:
      available:
      - 5.14-rhel9.7
      - 5.14-rhel9.5
      config:
        CONFIG_XEN_PVH: y
      default: 5.14-rhel9.7
    lustre:
      mode: server_ldiskfs
    os_name: rocky
    os_version: '9.7'
    srpm_url: https://dl.rockylinux.org/pub/rocky/9/BaseOS/source/tree/Packages/k
    status: working
    variants:
      mofed:
        container_overlay: rocky9/variants/mofed.container.Dockerfile
        image_overlay: rocky9/variants/mofed.image.Dockerfile
        params:
          # NVIDIA doesn't ship an rhel9.7 MOFED bundle; the rhel9.5
          # bundle works against the 9.7 kernel via
          # mlnxofedinstall --add-kernel-support.
          mofed_version: 24.10-2.1.8.0
          mofed_distro: rhel9.5
  ubuntu2404:
    configure_args:
    - --with-o2ib=no
    container_image: ubuntu:24.04
    kernel_deb_source: linux-source-6.8.0
    kernels:
      available:
      - 6.8-ubuntu2404
      config:
        CONFIG_PVH: y
      default: 6.8-ubuntu2404
    lustre:
      mode: client
    os_family: debian
    os_name: ubuntu
    os_version: '24.04'
    status: working
