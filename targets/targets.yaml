# ltvm target registry
#
# Each target defines an OS + kernel set for building and testing Lustre.
# Dockerfiles and package lists live in targets/<name>/.
#
# Fields:
#   os_name:         short OS name (rocky, ubuntu, ...)
#   os_version:      OS release version string
#   os_family:       rhel or debian (default: rhel)
#   arch:            cpu arch (default: x86_64)
#   server:          build server-side Lustre (default: true)
#   container_image: base image for the build container Dockerfile
#   status:          working | planned | experimental
#   kernels.default: lustre target name used when --kernel not specified
#   kernels.available: all lustre target names for this OS
#   kernels.config:  kernel .config overrides (merged with common fragment)
#   srpm_url:        base URL for downloading kernel SRPMs
#                    (omit for targets that don't use SRPMs, e.g. Ubuntu)
#   root_password:   root password for VM SSH access (default: initial0)
#   ssh_timeout:     seconds to wait for SSH after boot (default: 30)

defaults:
  arch: x86_64
  os_family: rhel
  server: true
  root_password: initial0
  ssh_timeout: 30

targets:
  rocky9:
    os_name: rocky
    os_version: "9.7"
    container_image: rockylinux:9.7
    status: working
    srpm_url: "https://dl.rockylinux.org/pub/rocky/9/BaseOS/source/tree/Packages/k"
    kernels:
      default: 5.14-rhel9.7
      available:
        - 5.14-rhel9.7
        - 5.14-rhel9.5
      config:
        CONFIG_XEN_PVH: "y"

  rocky8:
    os_name: rocky
    os_version: "8.9"
    container_image: rockylinux:8.9
    server: false    # Lustre master ldiskfs needs fsverity (not in 4.18)
    status: working
    srpm_url: "https://dl.rockylinux.org/pub/rocky/8/BaseOS/source/tree/Packages/k"
    kernels:
      default: 4.18-rhel8.10
      available:
        - 4.18-rhel8.10
      config:
        CONFIG_XEN_PVH: "y"

  rocky10:
    os_name: rocky
    os_version: "10.1"
    container_image: quay.io/rockylinux/rockylinux:10.1
    server: false    # Lustre master ldiskfs not yet ported to 6.12 VFS changes
    status: working
    srpm_url: "https://dl.rockylinux.org/pub/rocky/10/BaseOS/source/tree/Packages/k"
    kernels:
      default: 6.12-rhel10.1
      available:
        - 6.12-rhel10.1
      config:
        CONFIG_XEN_PVH: "y"

  ubuntu2404:
    os_name: ubuntu
    os_version: "24.04"
    os_family: debian
    container_image: ubuntu:24.04
    server: false
    status: experimental
    kernel_deb_source: linux-source-6.8.0
    configure_args:
      - "--with-o2ib=no"
    kernels:
      default: 6.8-ubuntu2404
      available:
        - 6.8-ubuntu2404
      config:
        CONFIG_PVH: "y"
