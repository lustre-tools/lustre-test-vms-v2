defaults:
  arch: x86_64
  os_family: rhel
  server: true
targets:
  rocky10:
    container_image: quay.io/rockylinux/rockylinux:10.1
    default_mem: 4096
    kernels:
      available:
      - 6.12-rhel10.1
      config:
        CONFIG_XEN_PVH: y
      default: 6.12-rhel10.1
    os_name: rocky
    os_version: '10.1'
    server: false
    srpm_url: https://dl.rockylinux.org/pub/rocky/10/BaseOS/source/tree/Packages/k
    status: working
  rocky8:
    container_image: rockylinux:8.9
    kernels:
      available:
      - 4.18-rhel8.10
      config:
        CONFIG_XEN_PVH: y
      default: 4.18-rhel8.10
    os_name: rocky
    os_version: '8.9'
    server: false
    srpm_url: https://dl.rockylinux.org/pub/rocky/8/BaseOS/source/tree/Packages/k
    status: working
  rocky9:
    container_image: rockylinux:9
    kernels:
      available:
      - 5.14-rhel9.7
      - 5.14-rhel9.5
      config:
        CONFIG_XEN_PVH: y
      default: 5.14-rhel9.7
    os_name: rocky
    os_version: '9.7'
    srpm_url: https://dl.rockylinux.org/pub/rocky/9/BaseOS/source/tree/Packages/k
    status: working
  ubuntu2404:
    configure_args:
    - --with-o2ib=no
    container_image: ubuntu:24.04
    kernel_deb_source: linux-source-6.8.0
    kernels:
      available:
      - 6.8-ubuntu2404
      config:
        CONFIG_PVH: y
      default: 6.8-ubuntu2404
    os_family: debian
    os_name: ubuntu
    os_version: '24.04'
    server: false
    status: experimental
