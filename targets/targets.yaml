defaults:
  arch: x86_64
  os_family: rhel
targets:
  rocky10:
    container_image: quay.io/rockylinux/rockylinux:10.1
    default_mem: 4096
    kernels:
      available:
      - 6.12-rhel10.1
      - name: 6.12-rhel10.0
        srpm_version: 6.12.0-55.41.1.el10_0
      config:
        CONFIG_XEN_PVH: y
      default: 6.12-rhel10.0
    lustre:
      mode: client
    os_name: rocky
    os_version: '10.1'
    srpm_url: https://dl.rockylinux.org/pub/rocky/10/BaseOS/source/tree/Packages/k
    status: working
  rocky8:
    container_image: rockylinux:8.9
    kernels:
      available:
      - 4.18-rhel8.10
      - 4.18-rhel8.9
      - 4.18-rhel8.8
      - 4.18-rhel8.7
      - 4.18-rhel8.6
      - 4.18-rhel8.5
      - 4.18-rhel8.4
      config:
        CONFIG_XEN_PVH: y
      default: 4.18-rhel8.10
    lustre:
      mode: client
    os_name: rocky
    os_version: '8.9'
    srpm_url: https://dl.rockylinux.org/pub/rocky/8/BaseOS/source/tree/Packages/k
    status: working
  rocky9:
    container_image: rockylinux:9
    kernels:
      available:
      - 5.14-rhel9.7
      - 5.14-rhel9.6
      - 5.14-rhel9.5
      - 5.14-rhel9.4
      - 5.14-rhel9.3
      - 5.14-rhel9.2
      - 5.14-rhel9.1
      config:
        CONFIG_XEN_PVH: y
      default: 5.14-rhel9.7
    lustre:
      mode: server_ldiskfs
    os_name: rocky
    os_version: '9.7'
    srpm_url: https://dl.rockylinux.org/pub/rocky/9/BaseOS/source/tree/Packages/k
    status: working
    variants:
      mofed-24:
        container_overlay: rocky9/variants/mofed-24.container.Dockerfile
        image_overlay: rocky9/variants/mofed-24.image.Dockerfile
        # MOFED 24.10-2.1.8.0's source predates rhel9.7's backport of
        # the NETIF_F_NETNS_LOCAL netdev-feature removal, so its kmods
        # won't compile against the rhel9.7 kernel.  Pin the variant
        # to rhel9.5 (which the bundle officially targets) until
        # NVIDIA ships a rhel9.7-compatible MOFED -- which will land
        # as a separate ``mofed-25`` variant alongside this one.
        kernel: 5.14-rhel9.5
        params:
          mofed_version: 24.10-2.1.8.0
          mofed_distro: rhel9.5
  ubuntu2404:
    configure_args:
    - --with-o2ib=no
    container_image: ubuntu:24.04
    kernel_deb_source: linux-source-6.8.0
    kernels:
      available:
      - 6.8-ubuntu2404
      config:
        CONFIG_PVH: y
      default: 6.8-ubuntu2404
    lustre:
      mode: client
    os_family: debian
    os_name: ubuntu
    os_version: '24.04'
    status: working
