# Rocky 9 kernel configuration
#
# The full .config comes from the Lustre tree:
#   lustre/kernel_patches/kernel_configs/kernel-<ver>-<target>-x86_64.config
# Patches come from:
#   lustre/kernel_patches/series/<target>.series
# SRPM version comes from:
#   lustre/kernel_patches/targets/<target>.target

[kernel]
# Default kernel for all operations when --kernel is not specified.
default = 5.14-rhel9.7

[kernels]
# All kernel versions available for this target.
# Each key is a Lustre target name from kernel_patches/targets/.
# Build the default with 'ltvm build-all rocky9'.
# Build a specific version with 'ltvm build-kernel rocky9 --kernel <name>'.
# Output lives in output/rocky9/kernels/<name>-<full-version>/
5.14-rhel9.7 =
5.14-rhel9.5 =

[config]
# Required for QEMU microvm direct kernel boot
CONFIG_XEN_PVH=y
