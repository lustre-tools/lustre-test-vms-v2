# Only listen on the VM bridge -- never bind to other interfaces.
# Prevents conflicts with systemd-resolved, WSL2 DNS proxy, etc.
interface=fcbr0
listen-address=192.168.100.1
bind-dynamic
except-interface=lo
no-resolv

dhcp-range=192.168.100.10,192.168.100.254,12h
dhcp-option=3,192.168.100.1
dhcp-option=6,8.8.8.8,8.8.4.4
